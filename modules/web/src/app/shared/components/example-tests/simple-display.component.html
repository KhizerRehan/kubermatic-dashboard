<div [ngClass]="{'highlighted': isHighlighted}" data-cy="container">
  <h2 data-cy="title">{{ title }}</h2>
  <p data-cy="description">{{ description }}</p>

  <button
    *ngIf="isActionEnabled"
    data-cy="action-button"
    (click)="onAction()"
    class="action-button"
  >
    Click Me
  </button>
</div>
